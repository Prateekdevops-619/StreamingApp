server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth service proxy  →  auth-service:3001
    location /proxy/auth/ {
        rewrite ^/proxy/auth/(.*) /$1 break;
        proxy_pass http://auth-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Streaming service proxy  →  streaming-service:3002
    location /proxy/streaming/ {
        rewrite ^/proxy/streaming/(.*) /$1 break;
        proxy_pass http://streaming-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin service proxy  →  admin-service:3003
    location /proxy/admin/ {
        rewrite ^/proxy/admin/(.*) /$1 break;
        proxy_pass http://admin-service:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Chat service HTTP proxy  →  chat-service:3004
    location /proxy/chat/ {
        rewrite ^/proxy/chat/(.*) /$1 break;
        proxy_pass http://chat-service:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Socket.IO WebSocket upgrade  →  chat-service:3004
    location /socket.io/ {
        proxy_pass http://chat-service:3004/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
